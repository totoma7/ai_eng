<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>루프 엔지니어링 — 문서 뷰어</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+KR:wght@300;400;500;600;700&family=IBM+Plex+Mono:ital,wght@0,400;0,500;0,600;1,400&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/marked@12/marked.min.js"></script>
<style>
:root{
  --ink:#0a0e14; --ink-2:#0f1520; --panel:#121a28;
  --line:#22304a; --line-soft:#1a2438;
  --text:#d7e0ee; --text-dim:#7d8ca3;
  --amber:#ffb454; --amber-deep:#e8851c; --cyan:#5ccfe6; --green:#87d96c; --red:#f07178;
  --mono:'IBM Plex Mono',monospace; --sans:'IBM Plex Sans KR',sans-serif;
}
*{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth}
body{background:var(--ink);color:var(--text);font-family:var(--sans);line-height:1.8}
body::before{
  content:'';position:fixed;inset:0;z-index:0;pointer-events:none;
  background-image:linear-gradient(var(--line-soft) 1px,transparent 1px),linear-gradient(90deg,var(--line-soft) 1px,transparent 1px);
  background-size:56px 56px;opacity:.25;
  mask-image:radial-gradient(ellipse 90% 70% at 50% 0%,black 30%,transparent 80%);
}
nav{
  position:sticky;top:0;z-index:50;background:rgba(10,14,20,.9);backdrop-filter:blur(10px);
  border-bottom:1px solid var(--line-soft);
}
.nav-inner{max-width:880px;margin:0 auto;padding:14px 28px;display:flex;gap:18px;align-items:center;flex-wrap:wrap}
.nav-logo{font-family:var(--mono);font-weight:600;color:var(--amber);font-size:.85rem;letter-spacing:.08em;text-decoration:none}
nav a{color:var(--text-dim);text-decoration:none;font-size:.78rem;font-family:var(--mono)}
nav a:hover{color:var(--amber)}
.doc-nav{margin-left:auto;display:flex;gap:14px}
main{position:relative;z-index:1;max-width:880px;margin:0 auto;padding:48px 28px 90px}
#status{font-family:var(--mono);color:var(--text-dim);font-size:.85rem;padding:60px 0;text-align:center}

/* ---------- markdown styles ---------- */
.md h1{font-size:1.9rem;line-height:1.3;margin:0 0 24px;letter-spacing:-.01em}
.md h1::before{content:'# ';color:var(--amber);font-family:var(--mono);font-size:1.3rem;vertical-align:middle}
.md h2{font-size:1.35rem;margin:52px 0 18px;padding-bottom:10px;border-bottom:1px solid var(--line-soft)}
.md h2::before{content:'## ';color:var(--cyan);font-family:var(--mono);font-size:1rem;vertical-align:middle}
.md h3{font-size:1.08rem;margin:36px 0 12px;color:var(--amber)}
.md p{margin:14px 0;color:var(--text)}
.md a{color:var(--cyan);text-decoration:none;border-bottom:1px dotted rgba(92,207,230,.4)}
.md a:hover{color:var(--amber);border-color:var(--amber)}
.md strong{color:#fff}
.md em{color:var(--text-dim);font-style:normal;border-bottom:1px dotted var(--text-dim)}
.md ul,.md ol{margin:14px 0;padding-left:26px}
.md li{margin:7px 0}
.md li::marker{color:var(--amber)}
.md blockquote{
  margin:22px 0;padding:16px 22px;border-left:3px solid var(--amber);
  background:linear-gradient(90deg,rgba(255,180,84,.07),transparent);border-radius:0 8px 8px 0;
}
.md blockquote p{margin:6px 0;color:var(--text)}
.md code{font-family:var(--mono);font-size:.84em;background:var(--ink-2);border:1px solid var(--line-soft);border-radius:4px;padding:2px 6px;color:var(--cyan)}
.md pre{
  margin:20px 0;padding:20px;background:var(--ink-2);border:1px solid var(--line);
  border-radius:10px;overflow-x:auto;line-height:1.6;
}
.md pre code{background:none;border:none;padding:0;color:var(--text);font-size:.8rem}
.md table{width:100%;border-collapse:collapse;margin:22px 0;font-size:.88rem}
.md th{
  font-family:var(--mono);font-size:.72rem;letter-spacing:.08em;color:var(--cyan);
  text-align:left;padding:10px 14px;border-bottom:2px solid var(--line);background:var(--ink-2);
}
.md td{padding:10px 14px;border-bottom:1px solid var(--line-soft);vertical-align:top}
.md tr:hover td{background:rgba(255,180,84,.03)}
.md hr{border:none;border-top:1px dashed var(--line);margin:40px 0}
.md img{max-width:100%;border-radius:8px}

.doc-footer{
  margin-top:70px;padding-top:24px;border-top:1px solid var(--line-soft);
  display:flex;justify-content:space-between;gap:16px;flex-wrap:wrap;font-family:var(--mono);font-size:.78rem;
}
.doc-footer a{color:var(--cyan);text-decoration:none}
.doc-footer a:hover{color:var(--amber)}
@media (max-width:640px){ main{padding:32px 18px 70px} .md h1{font-size:1.5rem} }
</style>
</head>
<body>

<nav>
  <div class="nav-inner">
    <a class="nav-logo" href="index.html">LOOP·ENG_</a>
    <a href="index.html#library">📚 전체 문서</a>
    <div class="doc-nav">
      <a id="prevLink" href="#" hidden>← 이전</a>
      <a id="nextLink" href="#" hidden>다음 →</a>
    </div>
  </div>
</nav>

<main>
  <div id="status">LOADING…</div>
  <article class="md" id="content"></article>
  <div class="doc-footer" id="docFooter" hidden>
    <a href="index.html#library">↩ 전체 문서 목록</a>
    <a id="ghLink" href="#" target="_blank" rel="noopener">GitHub에서 보기 ↗</a>
  </div>
</main>

<script>
/* 접근 게이트 — index.html과 동일한 쿠키 확인 */
const AUTH_HASH = 'f533d4a0c61101b6d6af75164470182b7f380b156a8313bee807d8f876c7e9b3';
const authed = document.cookie.split('; ').some(c => c === 'le_auth=' + AUTH_HASH);
if (!authed) location.replace('index.html');

/* 문서 레지스트리: key → {path, title} (목차 순서 = prev/next 순서) */
const DOCS = [
  ['README',                 { path: 'README.md',                              title: '목차 (README)' }],
  ['01-개념과-배경',          { path: '01-개념과-배경.md',                       title: '1장. 개념과 배경' }],
  ['02-에이전트-루프의-구조',  { path: '02-에이전트-루프의-구조.md',               title: '2장. 에이전트 루프의 구조' }],
  ['03-계보와-설계-패턴',     { path: '03-계보와-설계-패턴.md',                   title: '3장. 계보와 설계 패턴' }],
  ['04-실전-구성요소와-가드레일', { path: '04-실전-구성요소와-가드레일.md',         title: '4장. 실전 구성요소와 가드레일' }],
  ['05-리스크와-실천-가이드',  { path: '05-리스크와-실천-가이드.md',               title: '5장. 리스크와 실천 가이드' }],
  ['06-하네스와-루프',        { path: '06-하네스와-루프.md',                      title: '부록 6. 하네스와 루프' }],
  ['07-자바-프레임워크-비교',  { path: '07-자바-프레임워크-비교.md',               title: '부록 7. 자바 프레임워크 비교' }],
  ['08-하네스-엔지니어링-심화', { path: '08-하네스-엔지니어링-심화.md',             title: '심화 8. 하네스 엔지니어링' }],
  ['09-에이전트-Evals-설계',  { path: '09-에이전트-Evals-설계.md',                title: '심화 9. 에이전트 Evals 설계' }],
  ['10-멀티-에이전트-감독',    { path: '10-멀티-에이전트-감독.md',                 title: '심화 10. 멀티 에이전트 감독' }],
  ['11-Human-in-the-Loop',   { path: '11-Human-in-the-Loop.md',                 title: '심화 11. Human-in-the-Loop' }],
  ['12-환경-엔지니어링',      { path: '12-환경-엔지니어링.md',                    title: '심화 12. 환경 엔지니어링' }],
  ['practice',               { path: '../../practice/ralph-loop/README.md',     title: '실습. ralph-loop' }],
  ['practice-goal',          { path: '../../practice/ralph-loop/goal.md',       title: '실습. 목표 명세 (goal.md)' }],
];
const KEYS = DOCS.map(d => d[0]);
const MAP = Object.fromEntries(DOCS);
const GH_BASE = 'https://github.com/totoma7/ai_eng/blob/main/';

/* md 링크 → 뷰어 키 변환 */
function mdHrefToKey(href) {
  if (!href || !href.endsWith('.md')) return null;
  const clean = decodeURIComponent(href).replace(/^\.\//, '');
  if (clean.includes('practice/ralph-loop/README.md')) return 'practice';
  if (clean.includes('practice/ralph-loop/goal.md')) return 'practice-goal';
  const base = clean.split('/').pop().replace(/\.md$/, '');
  return KEYS.includes(base) ? base : null;
}

async function load() {
  const key = decodeURIComponent(location.hash.slice(1)) || 'README';
  const doc = MAP[key] || MAP['README'];
  const status = document.getElementById('status');
  const content = document.getElementById('content');
  status.style.display = 'block';
  status.textContent = 'LOADING…';
  content.innerHTML = '';
  document.title = doc.title + ' — 루프 엔지니어링';

  try {
    const res = await fetch(doc.path, { cache: 'no-cache' });
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const md = await res.text();
    content.innerHTML = marked.parse(md, { mangle: false, headerIds: false });

    /* 문서 내 .md 링크를 뷰어 라우트로 재작성 */
    content.querySelectorAll('a[href]').forEach(a => {
      const k = mdHrefToKey(a.getAttribute('href'));
      if (k) a.setAttribute('href', 'view.html#' + k);
    });

    /* prev/next + GitHub 링크 */
    const idx = KEYS.indexOf(key in MAP ? key : 'README');
    const prev = document.getElementById('prevLink');
    const next = document.getElementById('nextLink');
    prev.hidden = idx <= 0;
    next.hidden = idx < 0 || idx >= KEYS.length - 1;
    if (!prev.hidden) { prev.href = 'view.html#' + KEYS[idx - 1]; prev.textContent = '← ' + MAP[KEYS[idx - 1]].title; }
    if (!next.hidden) { next.href = 'view.html#' + KEYS[idx + 1]; next.textContent = MAP[KEYS[idx + 1]].title + ' →'; }
    const gh = document.getElementById('ghLink');
    gh.href = GH_BASE + doc.path.replace('../../', '');
    document.getElementById('docFooter').hidden = false;
    status.style.display = 'none';
    window.scrollTo(0, 0);
  } catch (e) {
    status.textContent = '⛔ 문서를 불러오지 못했습니다: ' + e.message;
  }
}

window.addEventListener('hashchange', load);
load();
</script>
</body>
</html>
